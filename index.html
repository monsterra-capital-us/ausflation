<!DOCTYPE html>
<html lang="en-AU" data-theme="light" data-density="regular">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ausflation · Australian inflation, marked-to-market daily — MonsterraCapital</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" />
<style>
/* ── Design system tokens ── */
:root {
  --capital-50:  #E6EEFF;
  --capital-100: #B8D1FF;
  --capital-200: #8AB3FF;
  --capital-300: #5C95FF;
  --capital-400: #2E77FF;
  --capital-500: #0059FF;
  --capital-600: #0050E3;
  --capital-700: #0039A3;
  --capital-800: #002975;
  --capital-900: #001947;
  --capital-950: #00091A;
  --slate-50:  #F7F8FB;
  --slate-100: #F0F2F7;
  --slate-200: #E1E4EE;
  --slate-400: #9BA3BD;
  --slate-600: #4F5878;
  --slate-800: #1E2438;
  --bone-50:  #FCFBF6;
  --bone-100: #F6F3EB;
  --bone-200: #EBE6D8;
  --success: #16A373;
  --warn:    #E89B1F;
  --danger:  #E04545;
  --info:    #4BB8F0;
  --white: #FFFFFF;
  --bg:           var(--bone-50);
  --bg-elevated:  var(--white);
  --bg-recessed:  var(--bone-100);
  --bg-callout:   var(--capital-50);
  --bg-inverse:   var(--capital-950);
  --fg1:  var(--capital-950);
  --fg2:  var(--slate-600);
  --fg3:  var(--slate-400);
  --fg-on-dark:    var(--bone-50);
  --fg-on-dark-2:  var(--capital-100);
  --fg-on-dark-3:  var(--capital-300);
  --accent:        var(--capital-500);
  --accent-hover:  var(--capital-600);
  --accent-active: var(--capital-700);
  --border-hairline:  var(--slate-200);
  --border-strong:    var(--capital-950);
  --border-on-dark:   rgba(255,255,255,0.10);
  --link:        var(--capital-700);
  --link-hover:  var(--capital-500);
  --font-head:    'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  --font-body:    'Nunito Sans', system-ui, -apple-system, sans-serif;
  --font-mono:    'IBM Plex Mono', ui-monospace, Menlo, monospace;
  --serif-display: var(--font-head);
  --sans-display:  var(--font-head);
  --sans-body:     var(--font-body);
  --code:          var(--font-mono);
  --fs-display-xl: clamp(48px, 9vw, 128px);
  --fs-display-l:  clamp(36px, 5.5vw, 72px);
  --fs-display-m:  clamp(28px, 4vw, 52px);
  --fs-headline-l: clamp(22px, 2.5vw, 34px);
  --fs-headline-m: clamp(18px, 1.8vw, 24px);
  --fs-headline-s: clamp(16px, 1.4vw, 20px);
  --fs-body-l:     clamp(17px, 1.5vw, 19px);
  --fs-body-m:     clamp(15px, 1.2vw, 17px);
  --fs-body-s:     14px;
  --fs-caption:    12px;
  --fs-eyebrow:    11px;
  --s-1:  4px; --s-2:  8px; --s-3: 16px; --s-4: 24px;
  --s-5: 32px; --s-6: 48px; --s-7: 64px; --s-8: 96px;
  --r-sm: 4px; --r-md: 8px; --r-lg: 14px; --r-pill: 999px;
  --shadow-1: 0 1px 0 rgba(0,9,26,0.04);
  --shadow-2: 0 2px 8px rgba(0,9,26,0.06);
  --shadow-3: 0 12px 32px rgba(0,9,26,0.10);
  --shadow-inset: inset 0 0 0 1px var(--slate-200);
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

.ausflation section[id],
.ausflation [id="index"],
.ausflation [id="categories"],
.ausflation [id="sources"],
.ausflation [id="method"] { scroll-margin-top: 72px; }

body {
  font-family: var(--font-body);
  color: var(--fg1);
  background: var(--white);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.ausflation { --font-mono: system-ui, -apple-system, "Segoe UI", sans-serif; }
a { color: var(--link); text-decoration: none; }
a:hover { color: var(--link-hover); }

/* ── Dark mode ── */
html[data-theme="dark"] body { background: var(--capital-950); color: var(--bone-50); }
html[data-theme="dark"] .nav { background: rgba(0,9,26,0.85); border-bottom-color: rgba(255,255,255,0.08); }
html[data-theme="dark"] .nav a { color: rgba(255,255,255,0.78); }
html[data-theme="dark"] .nav a:hover { color: var(--capital-300); }
html[data-theme="dark"] .brand-by { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .brand-by b { color: rgba(255,255,255,0.9); }
html[data-theme="dark"] .brand-sep { color: rgba(255,255,255,0.30); }
html[data-theme="dark"] .btn-ghost { color: var(--capital-300); border-color: rgba(255,255,255,0.18); }
html[data-theme="dark"] .btn-ghost:hover { border-color: var(--capital-300); background: rgba(92,149,255,0.08); }
html[data-theme="dark"] .hero-title { color: var(--bone-50); }
html[data-theme="dark"] .hero-kicker { color: rgba(255,255,255,0.65); }
html[data-theme="dark"] .hero-kicker .mono { color: var(--bone-50); }
html[data-theme="dark"] .hero-meta { border-color: rgba(255,255,255,0.12); }
html[data-theme="dark"] .meta-row { border-color: rgba(255,255,255,0.08); }
html[data-theme="dark"] .meta-row .k { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .meta-row .v { color: var(--bone-50); }
html[data-theme="dark"] .hero-stage { border-color: rgba(255,255,255,0.12); }
html[data-theme="dark"] .rate-num, html[data-theme="dark"] .rate-pct { color: var(--capital-300); }
html[data-theme="dark"] .big-rate .lbl { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .delta-pair .dk { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .rate-deltas { border-color: rgba(255,255,255,0.12); }
html[data-theme="dark"] .bench-card { border-color: rgba(255,255,255,0.12); }
html[data-theme="dark"] .bench-rate { color: var(--bone-50); }
html[data-theme="dark"] .bench-foot { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .bench-foot .mono { color: var(--bone-50); }
html[data-theme="dark"] .section-head h2 { color: var(--bone-50); }
html[data-theme="dark"] .section-sub { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .chart-wrap,
html[data-theme="dark"] .cat-card,
html[data-theme="dark"] .method-card { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.10); }
html[data-theme="dark"] .cat-name { color: var(--bone-50); }
html[data-theme="dark"] .cat-rate .num { color: var(--bone-50); }
html[data-theme="dark"] .cat-eyebrow,
html[data-theme="dark"] .cat-stats dt,
html[data-theme="dark"] .cat-rate-lbl,
html[data-theme="dark"] .ft-k { color: rgba(255,255,255,0.50); }
html[data-theme="dark"] .cat-stats dd,
html[data-theme="dark"] .ft-v { color: var(--bone-50); }
html[data-theme="dark"] .cat-stats > div,
html[data-theme="dark"] .cat-foot { border-color: rgba(255,255,255,0.08); }
html[data-theme="dark"] .src-chip { background: rgba(92,149,255,0.10); color: var(--capital-300); }
html[data-theme="dark"] .src-table { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.10); }
html[data-theme="dark"] .src-table th { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.10); background: rgba(255,255,255,0.03); }
html[data-theme="dark"] .src-table td { color: var(--bone-50); border-color: rgba(255,255,255,0.06); }
html[data-theme="dark"] .src-table tr:hover td { background: rgba(255,255,255,0.03); }
html[data-theme="dark"] .src-table td.muted { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .src-table .src-name { color: var(--bone-50); }
html[data-theme="dark"] .method-card h3 { color: var(--bone-50); }
html[data-theme="dark"] .method-card p { color: rgba(255,255,255,0.70); }
html[data-theme="dark"] .callout { background: rgba(92,149,255,0.06); border-color: var(--capital-500); }
html[data-theme="dark"] .callout h4 { color: var(--capital-300); }
html[data-theme="dark"] .callout p { color: rgba(255,255,255,0.78); }
html[data-theme="dark"] .seg { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10); }
html[data-theme="dark"] .seg-b { color: rgba(255,255,255,0.65); }
html[data-theme="dark"] .seg-b.on { background: var(--capital-500); color: white; }
html[data-theme="dark"] .chart-readout { border-color: rgba(255,255,255,0.10); color: rgba(255,255,255,0.78); }
html[data-theme="dark"] .chart-readout .rk { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .chart-readout .rv b { color: var(--bone-50); }
html[data-theme="dark"] .foot { background: #00040D; border-color: rgba(255,255,255,0.08); }
html[data-theme="dark"] .foot-fine { color: rgba(255,255,255,0.45); border-color: rgba(255,255,255,0.08); }
html[data-theme="dark"] .foot-meta dt { color: rgba(255,255,255,0.50); }
html[data-theme="dark"] .foot-meta dd { color: var(--bone-50); }
html[data-theme="dark"] .live-pill { background: rgba(22,163,115,0.12); color: #4FD8A6; }
html[data-theme="dark"] .live-tag { color: rgba(255,255,255,0.55); }
html[data-theme="dark"] .check { color: rgba(255,255,255,0.70); }
html[data-theme="dark"] .theme-toggle { color: var(--capital-300); border-color: rgba(255,255,255,0.18); }
html[data-theme="dark"] .theme-toggle:hover { border-color: var(--capital-300); background: rgba(92,149,255,0.08); color: var(--capital-300); }
html[data-theme="dark"] .bench-card { background: rgba(255,255,255,0.02); }

/* ── Compact density ── */
html[data-density="compact"] .hero { padding-top: 32px; padding-bottom: 32px; }
html[data-density="compact"] section { padding-top: 32px; padding-bottom: 32px; }
html[data-density="compact"] .hero-title { font-size: clamp(28px, 4vw, 52px); }
html[data-density="compact"] .cat-card { padding: 16px; }
html[data-density="compact"] .cat-rate .num { font-size: 28px; }

/* ── Page shell ── */
.ausflation { min-width: 1180px; }
.main { padding-bottom: 16px; }

/* ── Nav ── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.92);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--slate-200);
}
.nav-inner {
  max-width: 1440px; margin: 0 auto;
  padding: 14px 40px;
  display: flex; align-items: center; gap: 40px;
}
.brand { display: inline-flex; align-items: baseline; gap: 10px; color: inherit; }
.brand .wm { font: 900 22px/1 var(--font-head); letter-spacing: -0.04em; color: var(--capital-500); }
.brand-sep { color: var(--slate-400); font-weight: 500; }
.brand-by {
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--slate-600);
}
.brand-by b { color: var(--capital-950); font-weight: 600; }
.nav-links { display: flex; gap: 28px; margin-left: auto; }
.nav-links a {
  font: 500 13px/1 var(--font-head); letter-spacing: -0.005em;
  color: var(--capital-950); transition: color 120ms ease;
}
.nav-links a:hover { color: var(--capital-500); }
.nav-actions { display: flex; align-items: center; gap: 14px; }
.live-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px 5px 8px;
  background: rgba(22,163,115,0.08); color: var(--success);
  border-radius: 999px;
  font: 600 10px/1 var(--font-mono); letter-spacing: 0.22em;
}
.live-pill .pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--success);
  animation: pulse-dot 1.8s ease-out infinite;
}
@keyframes pulse-dot {
  0%   { box-shadow: 0 0 0 0 rgba(22,163,115,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(22,163,115,0); }
  100% { box-shadow: 0 0 0 0 rgba(22,163,115,0); }
}
.btn-ghost {
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--capital-700); padding: 9px 14px;
  border: 1px solid var(--slate-200); border-radius: 4px;
  transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
}
.btn-ghost:hover { border-color: var(--capital-500); background: rgba(0,89,255,0.02); }
.theme-toggle {
  appearance: none; width: 34px; height: 34px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--slate-200); border-radius: 4px;
  color: var(--capital-700); cursor: pointer;
  transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
}
.theme-toggle:hover { border-color: var(--capital-500); color: var(--capital-500); background: rgba(0,89,255,0.02); }
.theme-toggle:focus-visible { outline: 2px solid var(--capital-500); outline-offset: 2px; }

/* ── Hero ── */
section { max-width: 1440px; margin: 0 auto; padding: 56px 40px; }
.eyebrow {
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--capital-500); margin: 0 0 16px;
}
.hero { padding-top: 56px; padding-bottom: 24px; }
.hero-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 64px; align-items: end; margin-bottom: 48px; }
.hero-title {
  font: 900 clamp(40px,5.5vw,76px)/1.0 var(--font-head);
  letter-spacing: -0.045em; color: var(--capital-950);
  margin: 0; max-width: 14ch;
}
.hero-title em { font-style: normal; color: var(--capital-500); }
.hero-kicker {
  font: 400 italic 17px/1.6 var(--font-body); color: var(--slate-600);
  margin: 20px 0 0; max-width: 56ch;
}
.hero-kicker .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-style: normal; color: var(--capital-950); font-weight: 500; }
.hero-meta { border-left: 1px solid var(--slate-200); padding-left: 32px; }
.meta-row {
  display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
  padding: 10px 0; border-bottom: 1px solid var(--slate-200); font-size: 13px;
}
.meta-row:last-child { border-bottom: 0; padding-bottom: 0; }
.meta-row .k { font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--slate-600); }
.meta-row .v { font: 500 13px/1 var(--font-body); color: var(--capital-950); text-align: right; }
.meta-row .v.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

.hero-stage {
  display: grid; grid-template-columns: 1.5fr 1fr; gap: 64px;
  padding-top: 40px; border-top: 2px solid var(--capital-950);
}
.big-rate { padding-top: 4px; }
.big-rate .lbl {
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--slate-600); margin: 0 0 18px;
}
.rate-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.rate-num {
  font: 900 clamp(96px,14vw,192px)/0.9 var(--font-head);
  letter-spacing: -0.06em; color: var(--capital-500);
  font-variant-numeric: tabular-nums;
}
.rate-pct {
  font: 900 clamp(48px,6vw,80px)/0.9 var(--font-head);
  letter-spacing: -0.04em; color: var(--capital-500);
}
.live-tag {
  margin-left: 18px; align-self: end;
  display: inline-flex; align-items: center; gap: 8px;
  font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em;
  color: var(--slate-600); padding-bottom: 14px;
}
.live-tag .pulse {
  width: 7px; height: 7px; border-radius: 50%; background: var(--capital-500);
  animation: pulse-dot-blue 1.8s ease-out infinite;
}
@keyframes pulse-dot-blue {
  0%   { box-shadow: 0 0 0 0 rgba(0,89,255,0.5); }
  70%  { box-shadow: 0 0 0 8px rgba(0,89,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,89,255,0); }
}
.rate-deltas {
  display: grid; grid-template-columns: repeat(3,auto); gap: 48px;
  padding-top: 24px; margin-top: 24px; border-top: 1px solid var(--slate-200);
}
.delta-pair { display: flex; flex-direction: column; gap: 6px; }
.delta-pair .dk { font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--slate-600); }
.delta-pair .dv { font: 700 18px/1 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--capital-950); }
.delta-pair .dv.up { color: var(--success); }
.delta-pair .dv.down { color: var(--danger); }

.benchmark-stack { display: flex; flex-direction: column; gap: 16px; padding-top: 4px; }
.bench-card {
  padding: 20px 24px; border: 1px solid var(--slate-200); border-radius: 4px; background: white;
}
.bench-eyebrow { font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--slate-600); margin: 0 0 10px; }
.bench-rate {
  font: 900 36px/1 var(--font-head); letter-spacing: -0.025em;
  color: var(--capital-950); margin: 0 0 8px; font-variant-numeric: tabular-nums;
}
.bench-foot { font: 400 12px/1.45 var(--font-body); color: var(--slate-600); margin: 0; }
.bench-foot .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--capital-950); font-weight: 500; }

/* ── Section heads ── */
.section-head {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 32px;
  margin-bottom: 32px; flex-wrap: wrap;
}
.section-head h2 {
  font: 800 clamp(24px,2.5vw,34px)/1.1 var(--font-head);
  letter-spacing: -0.03em; color: var(--capital-950); margin: 0;
}
.section-sub { font: 400 italic 14px/1.55 var(--font-body); color: var(--slate-600); margin: 10px 0 0; max-width: 64ch; }
.link-arrow { font: 500 11px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase; color: var(--capital-700); }
.link-arrow:hover { color: var(--capital-500); }

/* ── Segmented control ── */
.seg {
  display: inline-flex; gap: 0;
  background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 4px; padding: 3px;
}
.seg-b {
  appearance: none; border: 0; background: transparent; padding: 7px 12px;
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--slate-600); cursor: pointer; border-radius: 3px;
  transition: background 120ms ease, color 120ms ease;
}
.seg-b:hover { color: var(--capital-950); }
.seg-b.on { background: var(--capital-500); color: white; }
.chart-controls { display: flex; gap: 18px; align-items: center; }
.check {
  display: inline-flex; align-items: center; gap: 8px;
  font: 500 11px/1 var(--font-mono); letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--slate-600); cursor: pointer; user-select: none;
}
.check input { accent-color: var(--capital-500); width: 14px; height: 14px; }

/* ── Chart ── */
.chart-section { padding-top: 16px; }
.chart-wrap {
  background: white; border: 1px solid var(--slate-200); border-radius: 4px; padding: 24px 24px 16px;
}
.chart-svg { width: 100%; height: 360px; display: block; }
.chart-readout {
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  padding-top: 16px; margin-top: 8px; border-top: 1px solid var(--slate-200);
  font: 500 12px/1 var(--font-body); color: var(--slate-600);
}
.chart-readout .rk {
  font: 500 10px/1 var(--font-mono); letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--slate-600); min-width: 110px;
}
.chart-readout .rv { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.chart-readout .rv b { color: var(--capital-950); font-weight: 600; }
.chart-readout .rv.delta b { color: var(--capital-500); }
.chart-readout .dot { width: 8px; height: 8px; border-radius: 50%; }
.chart-readout .dot.aus { background: var(--capital-500); }
.chart-readout .dot.abs { background: var(--slate-600); border: 1px dashed; }
.chart-readout .dot.cash { background: #C46A1F; border-radius: 1px; }
html[data-theme="dark"] .chart-readout .dot.cash { background: #E89B5A; }
.chart-readout .bandk { display: inline-block; width: 14px; height: 8px; background: rgba(0,89,255,0.18); border: 1px dashed rgba(0,89,255,0.4); border-radius: 2px; }

/* ── Categories grid ── */
.cats-section { padding-top: 32px; }
.cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.cat-card {
  background: white; border: 1px solid var(--slate-200); border-radius: 4px;
  padding: 22px 22px 18px; display: flex; flex-direction: column; gap: 14px;

  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label  : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (trackRef.current) { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); } };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider, TweakToggle, TweakRadio, TweakSelect, TweakButton });
</script>

<script type="text/babel">
function TrendChart({ timeframe, showAbs, dark }) {
  const { labels, ausflation, abs, cashRate } = window.AUSFLATION_SERIES;
  const [hover, setHover] = React.useState(null);

  const idxRange = React.useMemo(() => {
    const total = labels.length;
    const m = { "1M": 2, "3M": 4, "6M": 7, "1Y": 13, "5Y": total, "All": total }[timeframe] ?? total;
    return [Math.max(0, total - m), total];
  }, [timeframe, labels.length]);

  const view = React.useMemo(() => {
    const [a, b] = idxRange;
    return {
      labels:     labels.slice(a, b),
      ausflation: ausflation.slice(a, b),
      abs:        abs.slice(a, b),
      cashRate:   cashRate.slice(a, b),
    };
  }, [idxRange, labels, ausflation, abs, cashRate]);

  const W = 1180, H = 360;
  const PAD = { t: 24, r: 56, b: 36, l: 44 };
  const innerW = W - PAD.l - PAD.r;
  const innerH = H - PAD.t - PAD.b;

  const all = [...view.ausflation, ...(showAbs ? view.abs : []), ...view.cashRate, 2, 3];
  let yMin = Math.min(...all, 0);
  let yMax = Math.max(...all);
  yMin = Math.floor(yMin - 0.5);
  yMax = Math.ceil(yMax + 0.5);
  const yScale = (v) => PAD.t + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
  const xScale = (i) => PAD.l + (view.labels.length === 1 ? innerW / 2 : (i / (view.labels.length - 1)) * innerW);

  const path = (arr) =>
    arr.map((v, i) => `${i === 0 ? "M" : "L"} ${xScale(i).toFixed(2)} ${yScale(v).toFixed(2)}`).join(" ");

  const stepPath = (arr) => {
    let d = "";
    arr.forEach((v, i) => {
      const x = xScale(i).toFixed(2);
      const y = yScale(v).toFixed(2);
      if (i === 0) { d += `M ${x} ${y}`; return; }
      const prevY = yScale(arr[i - 1]).toFixed(2);
      d += ` L ${x} ${prevY} L ${x} ${y}`;
    });
    return d;
  };

  const areaPath = (() => {
    const top = view.ausflation.map((v, i) => `${i === 0 ? "M" : "L"} ${xScale(i).toFixed(2)} ${yScale(v).toFixed(2)}`).join(" ");
    const last = view.ausflation.length - 1;
    return top + ` L ${xScale(last).toFixed(2)} ${yScale(yMin).toFixed(2)} L ${xScale(0).toFixed(2)} ${yScale(yMin).toFixed(2)} Z`;
  })();

  const ticks = [];
  for (let v = yMin; v <= yMax; v += (yMax - yMin) <= 4 ? 0.5 : 1) ticks.push(v);

  const xTickIdx = (() => {
    const n = view.labels.length;
    const step = Math.max(1, Math.floor(n / 6));
    const out = [];
    for (let i = 0; i < n; i += step) out.push(i);
    if (out[out.length - 1] !== n - 1) out.push(n - 1);
    return out;
  })();

  const onMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * W;
    if (px < PAD.l || px > PAD.l + innerW) return setHover(null);
    const t = (px - PAD.l) / innerW;
    const i = Math.round(t * (view.labels.length - 1));
    setHover(i);
  };

  const bandTop    = yScale(3);
  const bandBottom = yScale(2);

  const fmtDate = (d) => d.toLocaleDateString("en-AU", { month: "short", year: "2-digit" });
  const fmtPct  = (v) => `${v >= 0 ? "" : "("}${Math.abs(v).toFixed(2)}${v < 0 ? ")" : ""}%`;

  const c = {
    grid:     dark ? "rgba(255,255,255,0.08)" : "var(--slate-200)",
    axis:     dark ? "rgba(255,255,255,0.55)" : "var(--slate-600)",
    aus:      "var(--capital-500)",
    abs:      dark ? "rgba(255,255,255,0.55)" : "var(--slate-600)",
    cash:     dark ? "#E89B5A" : "#C46A1F",
    band:     dark ? "rgba(92,149,255,0.10)" : "rgba(0,89,255,0.06)",
    bandLine: dark ? "rgba(92,149,255,0.30)" : "rgba(0,89,255,0.25)",
    area:     dark ? "rgba(92,149,255,0.18)" : "rgba(0,89,255,0.06)",
    text:     dark ? "var(--bone-50)" : "var(--capital-950)",
  };

  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} className="chart-svg"
           onMouseMove={onMove} onMouseLeave={() => setHover(null)} preserveAspectRatio="none">
        <rect x={PAD.l} y={bandTop} width={innerW} height={bandBottom - bandTop} fill={c.band} />
        <line x1={PAD.l} x2={PAD.l + innerW} y1={bandTop}    y2={bandTop}    stroke={c.bandLine} strokeDasharray="2 4" />
        <line x1={PAD.l} x2={PAD.l + innerW} y1={bandBottom} y2={bandBottom} stroke={c.bandLine} strokeDasharray="2 4" />
        <text x={PAD.l + innerW - 6} y={bandTop - 4} textAnchor="end"
              fontFamily="var(--font-mono)" fontSize="9" fill={c.bandLine} letterSpacing="0.18em">RBA TARGET 2–3%</text>

        {ticks.map((v, i) => (
          <g key={"t" + i}>
            <line x1={PAD.l} x2={PAD.l + innerW} y1={yScale(v)} y2={yScale(v)}
                  stroke={c.grid} strokeWidth={v === 0 ? 1.5 : 1} />
            <text x={PAD.l + innerW + 8} y={yScale(v) + 4}
                  fontFamily="var(--font-mono)" fontSize="10" fill={c.axis} letterSpacing="0.08em">{v.toFixed(1)}%</text>
          </g>
        ))}

        <path d={areaPath} fill={c.area} />

        <path d={stepPath(view.cashRate)} fill="none" stroke={c.cash}
              strokeWidth="1.75" strokeLinecap="square" strokeLinejoin="miter" opacity="0.9" />

        {showAbs && (
          <path d={path(view.abs)} fill="none" stroke={c.abs}
                strokeWidth="1.5" strokeDasharray="5 4" strokeLinecap="round" strokeLinejoin="round" />
        )}

        <path d={path(view.ausflation)} fill="none" stroke={c.aus}
              strokeWidth="2.25" strokeLinecap="round" strokeLinejoin="round" />

        {xTickIdx.map((i, idx) => {
          const anchor = idx === 0 ? "start" : idx === xTickIdx.length - 1 ? "end" : "middle";
          return (
            <text key={"x" + i} x={xScale(i)} y={H - 12}
                  fontFamily="var(--font-mono)" fontSize="10" fill={c.axis}
                  textAnchor={anchor} letterSpacing="0.08em">
              {fmtDate(view.labels[i]).toUpperCase()}
            </text>
          );
        })}

        {(() => {
          const i = view.ausflation.length - 1;
          return (
            <g>
              <circle cx={xScale(i)} cy={yScale(view.ausflation[i])} r="4"  fill={c.aus} />
              <circle cx={xScale(i)} cy={yScale(view.ausflation[i])} r="8"  fill={c.aus} opacity="0.18" />
            </g>
          );
        })()}

        {hover !== null && (() => {
          const x  = xScale(hover);
          const yA = yScale(view.ausflation[hover]);
          const yB = yScale(view.abs[hover]);
          const yC = yScale(view.cashRate[hover]);
          return (
            <g>
              <line x1={x} x2={x} y1={PAD.t} y2={PAD.t + innerH}
                    stroke={c.text} strokeWidth="0.5" strokeDasharray="2 3" opacity="0.4" />
              <circle cx={x} cy={yA} r="4" fill={c.aus} stroke="white" strokeWidth="1.5" />
              {showAbs && <circle cx={x} cy={yB} r="3.5" fill={dark ? "var(--bone-50)" : "white"} stroke={c.abs} strokeWidth="1.5" />}
              <rect x={x - 4} y={yC - 4} width="8" height="8"
                    fill={c.cash} stroke={dark ? "var(--capital-950)" : "white"} strokeWidth="1.5" />
            </g>
          );
        })()}
      </svg>

      <div className="chart-readout">
        {hover !== null ? (
          <>
            <span className="rk">{fmtDate(view.labels[hover]).toUpperCase()}</span>
            <span className="rv"><i className="dot aus" /> Ausflation <b>{fmtPct(view.ausflation[hover])}</b></span>
            {showAbs && <span className="rv"><i className="dot abs" /> ABS CPI <b>{fmtPct(view.abs[hover])}</b></span>}
            <span className="rv"><i className="dot cash" /> RBA cash <b>{view.cashRate[hover].toFixed(2)}%</b></span>
            <span className="rv delta">Δ <b>{fmtPct(view.ausflation[hover] - view.abs[hover])}</b></span>
          </>
        ) : (
          <>
            <span className="rk">HOVER FOR DETAIL</span>
            <span className="rv"><i className="dot aus" /> Ausflation</span>
            {showAbs && <span className="rv"><i className="dot abs" /> ABS CPI (monthly)</span>}
            <span className="rv"><i className="dot cash" /> RBA cash rate</span>
            <span className="rv band-key"><i className="bandk" /> RBA target band</span>
          </>
        )}
      </div>
    </div>
  );
}

window.TrendChart = TrendChart;
</script>

<script type="text/babel">
const fmtRate = (v, parens = true) => {
  if (v < 0 && parens) return `(${Math.abs(v).toFixed(2)}%)`;
  return `${v >= 0 ? "" : "−"}${Math.abs(v).toFixed(2)}%`;
};
const fmtDelta = (v) => `${v >= 0 ? "+" : ""}${v.toFixed(2)}pp`;
const fmtInt   = (v) => v.toLocaleString("en-AU");

function Sparkline({ series, accent = "var(--capital-500)" }) {
  const W = 120, H = 36, P = 2;
  const min = Math.min(...series), max = Math.max(...series);
  const span = Math.max(0.001, max - min);
  const pts = series.map((v, i) => {
    const x = P + i / (series.length - 1) * (W - 2 * P);
    const y = P + (1 - (v - min) / span) * (H - 2 * P);
    return [x, y];
  });
  const d    = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const area = d + ` L ${pts[pts.length-1][0].toFixed(1)} ${H - P} L ${pts[0][0].toFixed(1)} ${H - P} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="spark" preserveAspectRatio="none">
      <path d={area} fill={accent} opacity="0.10" />
      <path d={d} fill="none" stroke={accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2" fill={accent} />
    </svg>
  );
}

            Australian inflation,<br />marked-to-market <em>daily</em>.
          </h1>
          <p className="hero-kicker">
            An independent, high-frequency reading of Australian consumer prices.
            Tracking <span className="mono">{fmtInt(d.pricesTracked)}</span> live prices across{" "}
            <span className="mono">{d.sourcesActive}</span> Australian sources, mapped to the ABS basket.
          </p>
        </div>
        <aside className="hero-meta">
          <div className="meta-row"><span className="k">As of</span><span className="v">{d.asOf}</span></div>
          <div className="meta-row"><span className="k">Last refresh</span><span className="v mono">{d.lastUpdated}</span></div>
          <div className="meta-row"><span className="k">Index level</span><span className="v mono">{d.indexLevel.toFixed(2)}</span></div>
          <div className="meta-row"><span className="k">Base</span><span className="v mono">May 2024 = 100</span></div>
        </aside>
      </div>

      <div className="hero-stage">
        <div className="big-rate">
          <p className="lbl">Annual headline inflation &middot; year-over-year</p>
          <div className="rate-row">
            <span className="rate-num">{d.rate.toFixed(2)}</span>
            <span className="rate-pct">%</span>
            <span className="live-tag"><i className="pulse" />UPDATED 09:14 AEST</span>
          </div>
          <div className="rate-deltas">
            <div className="delta-pair">
              <span className="dk">24-hour</span>
              <span className={`dv ${dayDelta >= 0 ? "up" : "down"}`}>{fmtDelta(dayDelta)}</span>
            </div>
            <div className="delta-pair">
              <span className="dk">7-day</span>
              <span className={`dv ${weekDelta >= 0 ? "up" : "down"}`}>{fmtDelta(weekDelta)}</span>
            </div>
            <div className="delta-pair">
              <span className="dk">vs ABS {d.abs.period}</span>
              <span className={`dv ${vsAbs >= 0 ? "up" : "down"}`}>{fmtDelta(vsAbs)}</span>
            </div>
          </div>
        </div>

        <div className="benchmark-stack">
          <div className="bench-card">
            <p className="bench-eyebrow">ABS CPI &middot; official</p>
            <p className="bench-rate">{d.abs.rate.toFixed(2)}%</p>
            <p className="bench-foot">
              <span className="mono">{d.abs.period}</span> &middot; released{" "}
              <span className="mono">{d.abs.releaseDate}</span> &middot; next{" "}
              <span className="mono">{d.abs.nextRelease}</span>
            </p>
          </div>
          <div className="bench-card">
            <p className="bench-eyebrow">RBA target band</p>
            <p className="bench-rate">{d.rba.target[0].toFixed(1)}&ndash;{d.rba.target[1].toFixed(1)}%</p>
            <p className="bench-foot">
              Cash rate <span className="mono">{d.rba.cashRate.toFixed(2)}%</span> &middot; last move{" "}
              <span className="mono">6 May 2026 (+25 bp)</span>
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

function ChartSection({ tweaks, setTweak }) {
  const frames = ["1M", "3M", "6M", "1Y", "5Y", "All"];
  return (
    <section className="chart-section">
      <div className="section-head">
        <div>
          <p className="eyebrow">Trend</p>
          <h2>Ausflation index vs ABS CPI &middot; 36 months</h2>
        </div>
        <div className="chart-controls">
          <label className="check">
            <input type="checkbox" checked={tweaks.showAbs}
                   onChange={(e) => setTweak("showAbs", e.target.checked)} />
            <span>Overlay ABS CPI</span>
          </label>
          <div className="seg">
            {frames.map((f) => (
              <button key={f} className={"seg-b " + (tweaks.timeframe === f ? "on" : "")}
                      onClick={() => setTweak("timeframe", f)}>{f}</button>
            ))}
          </div>
        </div>
      </div>
      <TrendChart timeframe={tweaks.timeframe} showAbs={tweaks.showAbs} dark={tweaks.dark} />
    </section>
  );
}

function Categories({ tweaks }) {
  const cats = window.AUSFLATION_CATEGORIES;
  const [sortBy, setSortBy] = React.useState("weight");
  const sorted = React.useMemo(() => {
    const c = [...cats];
    if (sortBy === "weight") c.sort((a, b) => b.weight - a.weight);
    if (sortBy === "rate")   c.sort((a, b) => b.rate   - a.rate);
    if (sortBy === "delta")  c.sort((a, b) => Math.abs(b.rate - b.abs) - Math.abs(a.rate - a.abs));
    return c;
  }, [sortBy, cats]);

  return (
    <section id="categories" className="cats-section">
      <div className="section-head">
        <div>
          <p className="eyebrow">Components</p>
          <h2>All 11 ABS expenditure groups</h2>
          <p className="section-sub">Weighted to the ABS 17-series basket. Each component re-anchored to its own live feeds. Hover any card.</p>
        </div>
        <div className="seg">
          <button className={"seg-b " + (sortBy === "weight" ? "on" : "")} onClick={() => setSortBy("weight")}>By weight</button>
          <button className={"seg-b " + (sortBy === "rate"   ? "on" : "")} onClick={() => setSortBy("rate")}>By rate</button>
          <button className={"seg-b " + (sortBy === "delta"  ? "on" : "")} onClick={() => setSortBy("delta")}>By &Delta; vs ABS</button>
        </div>
      </div>

      <div className="cat-grid">
        {sorted.map((c) => {
          const delta    = c.rate - c.abs;
          const negative = c.rate < 0;
          return (
            <article key={c.id} className="cat-card">
              <header className="cat-head">
                <p className="cat-eyebrow">Weight <span className="mono">{c.weight.toFixed(1)}%</span></p>
                <h3 className="cat-name">{c.name}</h3>
              </header>
              <div className="cat-rate-row">
                <div className="cat-rate">
                  <span className={"num " + (negative ? "neg" : "")}>{fmtRate(c.rate)}</span>
                  <span className="cat-rate-lbl">YoY</span>
                </div>
                {tweaks.showSparklines && <Sparkline series={c.series} />}
              </div>
              <dl className="cat-stats">
                <div>
                  <dt>ABS</dt>
                  <dd className="mono">{fmtRate(c.abs)}</dd>
                </div>
                <div>
                  <dt>&Delta; vs ABS</dt>
                  <dd className={"mono " + (delta >= 0 ? "up" : "down")}>{fmtDelta(delta)}</dd>
                </div>
                <div>
                  <dt>30-day</dt>
                  <dd className={"mono " + (c.delta30d >= 0 ? "up" : "down")}>{fmtDelta(c.delta30d)}</dd>
                </div>
              </dl>
              <footer className="cat-foot">
                <span className="ft-k">Top contributor</span>
                <span className="ft-v">
                  {c.top.item}{" "}
                  <span className={"mono " + (c.top.change >= 0 ? "up" : "down")}>
                    {c.top.change >= 0 ? "+" : ""}{c.top.change.toFixed(1)}%
                  </span>
                </span>
              </footer>
              <div className="cat-sources">
                {c.sources.map((s) => <span key={s} className="src-chip">{s}</span>)}
              </div>
            </article>
          );
        })}
      </div>
    </section>
  );
}

function Sources() {
  const srcs = window.AUSFLATION_SOURCES;
  return (
    <section id="sources" className="src-section">
      <div className="section-head">
        <div>
          <p className="eyebrow">Inputs</p>
          <h2>Live Australian data sources</h2>
          <p className="section-sub">12 feeds, refreshed in real time. Where a price changes, the basket sees it within minutes.</p>
        </div>
        <a className="link-arrow" href="#method">Read the methodology &rarr;</a>
      </div>
      <table className="src-table">
        <thead>
          <tr>
            <th>Source</th>
            <th>Coverage</th>
            <th>Region</th>
            <th className="num">Items</th>
            <th className="num">Last sync</th>
            <th className="num">Lag</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {srcs.map((s) => (
            <tr key={s.id}>
              <td><span className="src-name">{s.name}</span></td>
              <td className="muted">{s.kind}</td>
              <td className="muted">{s.region}</td>
              <td className="num">{fmtInt(s.items)}</td>
              <td className="num">{s.sync}</td>
              <td className="num">{s.lag}</td>
              <td>
                <span className={"status status-" + s.status}>
                  <i className={"dot " + (s.status === "live" ? "pulse" : "")} />
                  {s.status === "live" ? "Streaming" : "OK"}
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </section>
  );
}

function Methodology() {
  const items = window.AUSFLATION_METHOD;
  return (
    <section id="method" className="method-section">
      <div className="section-head">
        <div>
          <p className="eyebrow">Methodology</p>
          <h2>How Ausflation is built.</h2>
        </div>
      </div>
      <div className="method-grid">
        {items.map((m, i) => (
          <article key={i} className="method-card">
            <p className="m-eyebrow">{m.eyebrow}</p>
            <h3>{m.head}</h3>
            <p>{m.body}</p>
          </article>
        ))}
      </div>
      <div className="callout">
        <h4>What would prove us wrong.</h4>
        <p>
          If Ausflation diverges from ABS CPI by more than <span className="mono">&plusmn;50bp</span> for
          two consecutive quarters, we publish a reconciliation memo within ten business days, identify the
          components driving the gap, and reweight or replace the offending feeds. This convention is non-negotiable.
        </p>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer className="foot">
      <div className="foot-inner">
        <div className="foot-brand">
          <span className="foot-wm">MonsterraCapital</span>
          <span className="foot-sub">Ausflation &mdash; a research benchmark.</span>
        </div>
        <dl className="foot-meta">
          <div><dt>Generated</dt><dd className="mono">17 May 2026 &middot; 09:14 AEST</dd></div>
          <div><dt>Licence</dt><dd className="mono">CC BY-NC 4.0</dd></div>
          <div><dt>Status</dt><dd className="mono">Research benchmark &middot; not endorsed by ABS or RBA</dd></div>
        </dl>
      </div>
      <div className="foot-fine">
        Ausflation is a private research benchmark produced by Monsterra Capital. It is not financial advice
        and is not an official statistic. The ABS Consumer Price Index remains the official measure of
        inflation in Australia.
      </div>
    </footer>
  );
}

const TWEAK_DEFAULTS = {
  timeframe: "1Y",
  showAbs: true,
  showSparklines: true,
  dark: false,
  compact: false,
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.dataset.theme   = t.dark    ? "dark"    : "light";
    document.documentElement.dataset.density = t.compact ? "compact" : "regular";
  }, [t.dark, t.compact]);

  return (
    <div className="ausflation" data-screen-label="Ausflation dashboard">
      <Header dark={t.dark} onToggleDark={() => setTweak("dark", !t.dark)} />
      <main className="main">
        <Hero />
        <ChartSection tweaks={t} setTweak={setTweak} />
        <Categories tweaks={t} />
        <Sources />
        <Methodology />
      </main>
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Chart" />
        <TweakRadio label="Default timeframe" value={t.timeframe}
                    options={["1M","3M","6M","1Y","5Y","All"]}
                    onChange={(v) => setTweak("timeframe", v)} />
        <TweakToggle label="Overlay ABS CPI"  value={t.showAbs}       onChange={(v) => setTweak("showAbs", v)} />
        <TweakSection label="Components" />
        <TweakToggle label="Show sparklines"  value={t.showSparklines} onChange={(v) => setTweak("showSparklines", v)} />
        <TweakToggle label="Compact density"  value={t.compact}        onChange={(v) => setTweak("compact", v)} />
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode"        value={t.dark}           onChange={(v) => setTweak("dark", v)} />
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);
</script>
</body>
</html>
